name: elderlycare
description: A caring medication and wellness reminder app for elderly users.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  flutter_tts: ^4.0.2
  url_launcher: ^6.2.4
  image_picker: ^1.0.7
  animations: ^2.0.11
  permission_handler: ^11.3.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  android_intent_plus: ^4.0.3
  shared_preferences: ^2.2.2
  android_alarm_manager_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# --- APP ICON CONFIGURATION ---
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  adaptive_icon_background: "#F4F7FA" # Matches your app background
  adaptive_icon_foreground: "assets/logo.png"

# --- SPLASH SCREEN CONFIGURATION ---
flutter_native_splash:
  color: "#F4F7FA" # Background color of splash screen
  image: "assets/logo.png"
  android_12:
    image: "assets/logo.png"
    icon_background_color: "#F4F7FA"
    color: "#F4F7FA"